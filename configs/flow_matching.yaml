data:
  dataset: "celeba"
  root: "./data/celeba-subset"
  from_hub: false
  repo_name: "electronickale/cmu-10799-celeba64-subset"
  image_size: 64
  channels: 3
  num_workers: 4
  pin_memory: true
  augment: true
  use_attributes: false
  # attribute_names: null

model:
  base_channels: 128
  channel_mult: [1, 2, 2, 4]
  num_res_blocks: 2
  attention_resolutions: [16, 8]
  num_heads: 4
  dropout: 0.1
  use_scale_shift_norm: true
  use_conditioning: false
  num_attributes: 40

training:
  batch_size: 128
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  ema_decay: 0.9999
  ema_start: 5000
  gradient_clip_norm: 0.5
  num_iterations: 100000
  log_every: 50
  sample_every: 5000
  save_every: 5000
  num_samples: 64
  cond_drop_prob: 0.1

flow_matching:
  t_min: 0.0
  t_max: 1.0

sampling:
  num_steps: 100
  sampler: "flow_matching"
  guidance_scale: 1.0

infrastructure:
  seed: 42
  device: "cuda"
  num_gpus: 1
  mixed_precision: false
  compile_model: false

checkpoint:
  dir: "./checkpoints"
  resume: null

logging:
  dir: "./logs"
  wandb:
    enabled: true
    project: "cmu-10799-diffusion"
    entity: null
